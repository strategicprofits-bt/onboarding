<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started — Strategic Profits</title>
  <meta name="description" content="Two paths to getting started with Strategic Profits: understand the mental model, or jump straight into setup.">
  <meta property="og:title" content="Get Started — Strategic Profits">
  <meta property="og:description" content="Two paths: understand the mental model or jump straight into setup.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://onboarding.strategicprofits.com">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Get Started — Strategic Profits">
  <meta name="twitter:description" content="Two paths: understand the mental model or jump straight into setup.">
  <link rel="stylesheet" href="/style.css?v=20260508f">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">Strategic Profits</a>
      <div class="nav-links">
        <a href="/mental-model/">Mental Model</a>
        <a href="/setup/">Setup</a>
        <a href="/next-steps/">Next Steps</a>
      </div>
    </div>
  </nav>

  <main id="main">
    <section class="landing-hero">
      <div class="container">
        <div class="hero-badge">Get Started</div>
        <h1>Stop chatting with AI.<br>Start building with it.</h1>
        <p class="hero-sub">Select your program to get started.</p>
      </div>
    </section>

    <section class="landing-choices">
      <div class="container">
        <div class="program-grid">
          <button class="program-card" onclick="selectProgram('ZenithMind OS')">ZenithMind OS</button>
          <button class="program-card" onclick="selectProgram('Force Multiplier')">Force Multiplier</button>
          <button class="program-card" onclick="selectProgram('Connect the Dots')">Connect the Dots</button>
          <button class="program-card" onclick="selectProgram('Maximum Profits')">Maximum Profits</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Strategic Profits. All rights reserved.</p>
    </div>
  </footer>

  <script>
    window.addEventListener('scroll', function() {
      document.getElementById('nav').classList.toggle('nav-scrolled', window.scrollY > 40);
    }, { passive: true });

    function getProgram() {
      var m = document.cookie.match(/(?:^|;\s*)sp-program=([^;]+)/);
      return m ? decodeURIComponent(m[1]) : null;
    }
    function selectProgram(name) {
      document.cookie = 'sp-program=' + encodeURIComponent(name) + ';path=/;max-age=31536000;SameSite=Lax';
      window.location.href = '/mental-model/';
    }
    // Auto-redirect if program already selected
    if (getProgram()) {
      window.location.href = '/mental-model/';
    }
  </script>
</body>
</html>
